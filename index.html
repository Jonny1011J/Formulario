<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
    <img src="uniplac_logo.jpeg" alt="Identidade Visual da Uniplac Lages">
    </div>

    <div>
        <h1>Formulário de cadastro de Usuário </h1>
    </div>
    <div>    
        <h3>Preencha os campos abaixo:</h3>
    </div>

    <div>
        <form action="" method="GET">
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" ><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email" ><br><br>

            <label for="endereco">Endereço:</label>
            <input type="text" name="endereco" id="endereco" placeholder="Digite seu endereço" ><br><br>

            <label for="telefone">Telefone:</label>
            <input type="tel" name="telefone" id="telefone" placeholder="(49) 99999-9999"><br><br>

            <label for="data_nascimento:">Data de nacimento:</label>
            <input type="date" name="data_nascimento" id="data_nascimento"><br><br>

            <label for="uni">Universidade:</label>
            <input type="text" name="uni" id="uni" placeholder="Digite seu universidade"><br><br>

            <label for="curso">Curso:</label>
            <input type="text" name="curso" id="curso" placeholder="Digite seu curso"><br><br>

            <label for="turno">Seu turno:</label>
            <input type="radio" name="turno" id="turno">Matutino
            <input type="radio" name="turno" id="turno">Vespertino
            <input type="radio" name="turno" id="turno">Noturno
            <br><br>
            
            <input type="submit" value="Enviar">
        </form>
    </div>
</body>
</html>
